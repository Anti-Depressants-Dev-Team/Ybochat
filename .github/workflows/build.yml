name: Build

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: node scripts/make-icon.js
      - name: Fix winCodeSign cache
        run: node scripts/fix-cache.js
      - run: npx electron-builder --win --publish=never
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: actions/upload-artifact@v4
        with: { name: ybochat-windows-setup, path: dist/*Setup*.exe }
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with: { files: dist/*Setup*.exe, generate_release_notes: true }

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2t64 rpm 2>/dev/null || sudo apt-get install -y --no-install-recommends libfuse2 rpm
      - run: npm ci
      - run: node scripts/make-icon.js
      - run: npx electron-builder --linux --publish=never
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: actions/upload-artifact@v4
        with:
          name: ybochat-linux
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
          generate_release_notes: true
